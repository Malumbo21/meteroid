packages:
  - 'packages/*'
  - 'web-app'
engineStrict: true
nodeLinker: hoisted
publicHoistPattern:
  - '*prisma*'
  - '*eslint*'
  - '*storybook*'
strictPeerDependencies: false
allowBuilds:
  '@bufbuild/buf': true
  '@md/icons': true
  '@parcel/watcher': false
  core-js: false
  esbuild: false
  protobufjs: false
  sharp: false
  unrs-resolver: false
